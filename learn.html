<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DOROSlearn ULTRA · Алгебра + ИИ</title>
    <meta name="description" content="Автоматическая платформа: ИИ-мультичат, YouTube поиск видео по алгебре 5-11 класс, генерация тестов через ИИ, решатель задач и сертификаты.">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --blue: #2563eb;
            --cyan: #06cdd4;
            --gold: #f4b940;
            --purple: #9b5cf6;
            --bg-deep: #0a0c12;
            --card-glass: rgba(18,22,32,0.7);
            --border-cyan: rgba(6,205,212,0.25);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: #fff;
            overflow-x: hidden;
        }
        /* градиентный фон */
        .bg-aura {
            position:fixed; inset:0; z-index:-2;
            background: radial-gradient(circle at 10% 20%, rgba(37,99,235,0.2), var(--bg-deep) 85%);
        }
        .bg-aura::after {
            content:''; position:absolute; inset:0;
            background: radial-gradient(circle at 90% 70%, rgba(6,205,212,0.12), transparent 70%);
        }
        .grid-lines {
            position:fixed; inset:0;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index:-1; pointer-events:none;
        }

        .app-layout {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            gap: 24px;
            min-height: 100vh;
        }

        /* левая панель: уроки */
        .learn-panel {
            flex: 1.2;
            background: var(--card-glass);
            backdrop-filter: blur(18px);
            border-radius: 32px;
            border: 1px solid var(--border-cyan);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .grade-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 60px;
            justify-content: center;
        }
        .grade-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 8px 20px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .grade-btn.active {
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            border-color: transparent;
            box-shadow: 0 0 12px rgba(6,205,212,0.4);
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .progress-bar-wrap {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            height: 10px;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--blue));
            transition: width 0.3s;
        }
        .reset-prog {
            background: none;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 16px;
            border-radius: 30px;
            color: #ddd;
            cursor: pointer;
        }
        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 6px;
        }
        .lesson-card {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(6,205,212,0.2);
            border-radius: 28px;
            padding: 18px;
            transition: 0.2s;
        }
        .lesson-card.locked {
            opacity: 0.5;
            filter: blur(1px);
            pointer-events: none;
        }
        .lesson-title {
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
        }
        .lesson-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .btn-neon {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(6,205,212,0.4);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.75rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-neon.primary {
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            border: none;
        }
        .btn-neon:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        .video-preview {
            margin-top: 12px;
            border-radius: 20px;
            overflow: hidden;
        }
        .video-preview iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
        }

        /* правая панель: мультичат */
        .chat-panel {
            width: 400px;
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid var(--border-cyan);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            padding: 20px;
            border-bottom: 1px solid rgba(6,205,212,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .model-select {
            background: #0f111a;
            border: 1px solid var(--cyan);
            border-radius: 40px;
            padding: 6px 12px;
            color: white;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg {
            display: flex;
            gap: 10px;
        }
        .msg.user {
            justify-content: flex-end;
        }
        .msg-bubble {
            max-width: 80%;
            background: rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 0.85rem;
        }
        .msg.user .msg-bubble {
            background: linear-gradient(135deg, var(--blue), var(--cyan));
        }
        .chat-input-area {
            padding: 16px;
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .chat-input-area input {
            flex: 1;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-cyan);
            border-radius: 60px;
            padding: 12px 16px;
            color: white;
        }
        .chat-input-area button {
            background: var(--cyan);
            border: none;
            width: 44px;
            border-radius: 44px;
            color: black;
        }
        .quick-actions {
            display: flex;
            gap: 8px;
            padding: 8px 16px;
            flex-wrap: wrap;
        }
        .qa-btn {
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 6px 12px;
            font-size: 0.7rem;
            cursor: pointer;
        }
        /* модалки */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-card {
            background: #11141f;
            border: 1px solid var(--cyan);
            border-radius: 32px;
            max-width: 550px;
            width: 90%;
            padding: 28px;
            color: white;
        }
        .test-question {
            margin-bottom: 20px;
            background: rgba(255,255,255,0.03);
            padding: 16px;
            border-radius: 24px;
        }
        .option {
            display: block;
            margin: 8px 0;
        }
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #0f1222;
            border: 1px solid var(--cyan);
            border-radius: 40px;
            padding: 12px 24px;
            z-index: 1100;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 1000px) {
            .app-layout { flex-direction: column; }
            .chat-panel { width: 100%; max-height: 500px; }
        }
        ::-webkit-scrollbar { width: 5px; }
    </style>
</head>
<body>
<div class="bg-aura"></div>
<div class="grid-lines"></div>

<div class="app-layout">
    <!-- ЛЕВАЯ ЧАСТЬ: Алгебра 5-11 -->
    <div class="learn-panel">
        <div class="grade-selector" id="gradeSelector"></div>
        <div class="progress-header">
            <div class="progress-bar-wrap"><div class="progress-fill" id="globalProgressFill"></div></div>
            <button class="reset-prog" id="resetProgressBtn"><i class="fas fa-undo-alt"></i> Сброс</button>
        </div>
        <div id="lessonsContainer" class="lessons-grid"></div>
        <div style="font-size:0.7rem; text-align:center; opacity:0.5;">⭐ Видео ищутся автоматически через YouTube API или прямой поиск</div>
    </div>

    <!-- ПРАВАЯ ЧАСТЬ: ИИ-мультичат (история, модели, инструменты) -->
    <div class="chat-panel">
        <div class="chat-header">
            <h3><i class="fas fa-brain" style="color: var(--cyan);"></i> DOROSai Чат</h3>
            <select id="chatModelSelect" class="model-select">
                <option value="openai">GPT-4</option>
                <option value="llama">Llama 3</option>
                <option value="mistral">Mistral</option>
                <option value="gemini">Gemini Pro</option>
            </select>
        </div>
        <div class="quick-actions">
            <div class="qa-btn" onclick="aiGenerateTestForCurrentTopic()"><i class="fas fa-file-alt"></i> Тест по теме</div>
            <div class="qa-btn" onclick="aiFindVideoByTopic()"><i class="fab fa-youtube"></i> Найти видео</div>
            <div class="qa-btn" onclick="aiMakeSummary()"><i class="fas fa-scroll"></i> Конспект</div>
        </div>
        <div class="chat-messages" id="chatMessagesArea">
            <div class="msg bot"><div class="msg-bubble">👋 Привет! Я DOROSai. Спрашивай про алгебру, генерируй тесты или ищи видео по теме.</div></div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Спроси у ИИ..." autocomplete="off">
            <button id="sendChatBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
        <button id="openSolverBtn" style="margin: 12px; background: rgba(155,92,246,0.3); border:none; border-radius:40px; padding:10px; color:white;"><i class="fas fa-calculator"></i> 🤖 ИИ-Решатель задач</button>
    </div>
</div>

<!-- модалка: тест -->
<div id="testModal" class="modal-overlay"><div class="modal-card" id="testModalContent"></div></div>
<!-- модалка: решатель -->
<div id="solverModal" class="modal-overlay"><div class="modal-card"><h3>🤖 ИИ-Решатель</h3><textarea id="solverTask" rows="4" style="width:100%; background:#000; color:white; border:1px solid var(--cyan); border-radius:20px; padding:12px;" placeholder="Введи задачу по алгебре..."></textarea><div style="display:flex; gap:12px; margin-top:16px;"><button id="solveTaskBtn" class="btn-neon primary">Решить</button><button onclick="closeModal('solverModal')">Закрыть</button></div><div id="solverAnswer" style="margin-top:16px; background:rgba(255,255,255,0.05); border-radius:20px; padding:12px;"></div></div></div>

<script>
    // --------------------------------------------------------------
    // 1. ДАННЫЕ: темы по алгебре 5-11 класс (только названия)
    const curriculum = {
        5: ["Натуральные числа", "Дроби и смешанные числа", "Проценты", "Простейшие уравнения", "Координаты и шкала"],
        6: ["Рациональные числа", "Пропорции и отношения", "Модуль числа", "Степень с натуральным показателем", "Решение неравенств"],
        7: ["Многочлены и одночлены", "Формулы сокращённого умножения", "Линейная функция", "Системы линейных уравнений", "Степень с целым показателем"],
        8: ["Квадратные корни", "Квадратные уравнения", "Теорема Виета", "Квадратные неравенства", "Преобразование выражений"],
        9: ["Арифметическая прогрессия", "Геометрическая прогрессия", "Квадратичная функция", "Степень с рациональным показателем", "Неравенства методом интервалов"],
        10: ["Тригонометрические выражения", "Тригонометрические уравнения", "Производная функции", "Исследование функций", "Показательные уравнения"],
        11: ["Логарифмы и их свойства", "Логарифмические уравнения", "Интегралы", "Комплексные числа", "Финансовая математика"]
    };
    let currentGrade = 9;
    let progress = {}; // { grade: maxLessonIndexCompleted }
    let currentTestLessonMeta = null; // { grade, topic, lessonIndex }
    let chatHistory = [{role:"assistant", content:"Добро пожаловать в DOROSlearn ULTRA! Выбери класс и тему, я помогу с видео и тестами."}];

    // YouTube API (можно заменить своим ключом, но fallback работает)
    const YOUTUBE_API_KEY = ""; // если пусто, используем fallback поиск
    async function searchYouTubeVideo(topic, grade) {
        const query = `${topic} ${grade} класс алгебра урок`;
        if (YOUTUBE_API_KEY) {
            try {
                const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=1&q=${encodeURIComponent(query)}&type=video&key=${YOUTUBE_API_KEY}`;
                const resp = await fetch(url);
                const data = await resp.json();
                if (data.items && data.items[0]) return `https://www.youtube.com/embed/${data.items[0].id.videoId}`;
            } catch(e) { console.warn(e); }
        }
        // fallback: ссылка на поиск youtube
        return `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
    }

    // ИИ вызов (Pollinations)
    async function callAI(prompt, model = 'openai') {
        const url = `https://text.pollinations.ai/${encodeURIComponent(prompt)}?model=${model}`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('AI error');
        return await resp.text();
    }

    // Генерация теста через ИИ
    async function generateTestFromAI(topic, grade) {
        const prompt = `Сгенерируй тест из 5 вопросов по теме "${topic}" для ${grade} класса по алгебре. Каждый вопрос имеет 4 варианта ответа (а,б,в,г). После каждого вопроса в скобках напиши номер правильного ответа (1,2,3,4). Вопросы с новой строки.`;
        const raw = await callAI(prompt, 'openai');
        return parseTestFromAI(raw);
    }

    function parseTestFromAI(text) {
        const lines = text.split('\n');
        let questions = [];
        let current = null;
        for (let line of lines) {
            if (line.match(/^\d+[\.\)]?\s*Вопрос\s*\d+/i) || line.match(/^\d+\./)) {
                if (current) questions.push(current);
                current = { text: line.replace(/^\d+[\.\)]?\s*/, ''), options: [], correct: 0 };
            } else if (current && line.match(/[а-г]\)/)) {
                let optText = line.trim();
                current.options.push(optText);
                let match = line.match(/\((\d)\)/);
                if (match) current.correct = parseInt(match[1]) - 1;
            } else if (current && line.trim() && current.options.length < 4) {
                current.options.push(line.trim());
            }
        }
        if (current && current.options.length===4) questions.push(current);
        while(questions.length < 5) questions.push({text:"Дополнительный вопрос: Чему равен квадратный корень из 9?", options:["2","3","4","5"], correct:1});
        return questions.slice(0,5);
    }

    // сохранение прогресса
    function loadProgress() { const p = localStorage.getItem('doros_progress_v2'); if(p) progress = JSON.parse(p); else progress = {}; }
    function saveProgress() { localStorage.setItem('doros_progress_v2', JSON.stringify(progress)); updateGlobalProgressBar(); }
    function updateGlobalProgressBar() {
        let lessonsLen = curriculum[currentGrade].length;
        let completed = progress[currentGrade] || 0;
        let percent = (completed / lessonsLen) * 100;
        document.getElementById('globalProgressFill').style.width = percent + '%';
    }
    function markLessonCompleted(grade, idx) {
        let currentMax = progress[grade] || 0;
        if (idx > currentMax) { progress[grade] = idx; saveProgress(); renderLessons(); }
    }
    function resetProgress() { if(confirm('Сбросить весь прогресс по всем классам?')){ progress={}; saveProgress(); renderLessons(); } }

    // рендер уроков
    function renderLessons() {
        const container = document.getElementById('lessonsContainer');
        const topics = curriculum[currentGrade];
        const completedIdx = progress[currentGrade] || 0;
        let html = '';
        topics.forEach((topic, idx) => {
            const locked = idx > completedIdx;
            html += `<div class="lesson-card ${locked ? 'locked' : ''}" data-lesson-index="${idx}">
                <div class="lesson-title"><span>📘 ${topic}</span><span>${idx+1}/${topics.length}</span></div>
                <div class="lesson-actions">
                    <button class="btn-neon primary" onclick="watchVideo('${topic.replace(/'/g,"\\'")}', ${currentGrade})"><i class="fab fa-youtube"></i> Смотреть</button>
                    <button class="btn-neon" onclick="openTestForTopic('${topic.replace(/'/g,"\\'")}', ${currentGrade}, ${idx})"><i class="fas fa-pencil-alt"></i> Тест (ИИ)</button>
                    <button class="btn-neon" onclick="markUnderstood(${idx})">✅ Понял</button>
                    <button class="btn-neon" onclick="markConfused('${topic.replace(/'/g,"\\'")}')">❓ Вопрос в чат</button>
                </div>
                <div id="videoEmbed-${idx}" class="video-preview" style="display:none;"></div>
            </div>`;
        });
        container.innerHTML = html;
        updateGlobalProgressBar();
    }

    window.watchVideo = async function(topic, grade) {
        const embedUrl = await searchYouTubeVideo(topic, grade);
        const lessonIdx = curriculum[grade].indexOf(topic);
        const containerDiv = document.getElementById(`videoEmbed-${lessonIdx}`);
        if(containerDiv) {
            if(embedUrl.includes('youtube.com/embed')) {
                containerDiv.innerHTML = `<iframe src="${embedUrl}?autoplay=1" allowfullscreen></iframe>`;
            } else {
                containerDiv.innerHTML = `<a href="${embedUrl}" target="_blank" class="btn-neon primary" style="display:inline-block;">🔍 Открыть поиск YouTube</a>`;
            }
            containerDiv.style.display = 'block';
            setTimeout(() => containerDiv.scrollIntoView({behavior:'smooth', block:'nearest'}), 100);
        } else {
            window.open(embedUrl, '_blank');
        }
    };

    window.openTestForTopic = async function(topic, grade, lessonIdx) {
        const modal = document.getElementById('testModal');
        const contentDiv = document.getElementById('testModalContent');
        contentDiv.innerHTML = `<div style="text-align:center;"><i class="fas fa-spinner fa-pulse"></i> Генерация теста через ИИ по теме "${topic}" ...</div>`;
        modal.style.display = 'flex';
        try {
            const questions = await generateTestFromAI(topic, grade);
            let qHtml = `<h3>📋 Тест: ${topic} (${grade} класс)</h3>`;
            questions.forEach((q, i) => {
                qHtml += `<div class="test-question" data-qidx="${i}"><strong>${i+1}. ${q.text}</strong><div class="options">`;
                q.options.forEach((opt, optIdx) => {
                    qHtml += `<label class="option"><input type="radio" name="q${i}" value="${optIdx}"> ${opt}</label>`;
                });
                qHtml += `</div></div>`;
            });
            qHtml += `<div style="display:flex; gap:12px; margin-top:20px;"><button id="submitTestBtnLocal" class="btn-neon primary">Проверить</button><button onclick="closeModal('testModal')">Отмена</button></div><div id="testResultMsg"></div>`;
            contentDiv.innerHTML = qHtml;
            window.__currentTestQuestions = questions;
            window.__currentTestMeta = { grade, topic, lessonIdx };
            document.getElementById('submitTestBtnLocal').onclick = () => submitGeneratedTest(questions, grade, lessonIdx);
        } catch(e) { contentDiv.innerHTML = `<div>Ошибка генерации теста: ${e.message}<button onclick="closeModal('testModal')">Закрыть</button></div>`; }
    };

    async function submitGeneratedTest(questions, grade, lessonIdx) {
        let correct = 0;
        questions.forEach((_, i) => {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (selected && parseInt(selected.value) === questions[i].correct) correct++;
        });
        const resultDiv = document.getElementById('testResultMsg');
        if (correct >= 4) {
            resultDiv.innerHTML = `<div style="background:rgba(16,185,129,0.2); border-radius:20px; padding:12px;">✅ Поздравляем! ${correct}/5. Тема освоена! 🎓</div>`;
            markLessonCompleted(grade, lessonIdx);
            setTimeout(() => showCertificateForTopic(questions[0]?.text || "Алгебра", grade, lessonIdx), 500);
        } else {
            resultDiv.innerHTML = `<div style="background:rgba(239,68,68,0.2); padding:12px; border-radius:20px;">❌ ${correct}/5 правильных. Рекомендуем пересмотреть видео и попробовать ещё раз.</div>`;
        }
    }

    function showCertificateForTopic(topic, grade, lessonIdx) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
        doc.setFillColor(10,12,30); doc.rect(0,0,297,210,'F');
        doc.setDrawColor(6,205,212); doc.setLineWidth(1); doc.roundedRect(15,15,267,180,10,10,'S');
        doc.setFontSize(28); doc.setTextColor(244,185,64); doc.text('DOROSlearn', 148.5, 50, { align: 'center' });
        doc.setFontSize(20); doc.setTextColor(255,255,255); doc.text('СЕРТИФИКАТ', 148.5, 80, { align: 'center' });
        doc.setFontSize(14); doc.text(`об успешном прохождении темы: ${topic} (${grade} класс)`, 148.5, 105, { align: 'center' });
        let name = localStorage.getItem('doros_username') || 'Ученик';
        doc.setFontSize(18); doc.text(name, 148.5, 135, { align: 'center' });
        doc.setFontSize(10); doc.text(`Дата: ${new Date().toLocaleDateString()}`, 148.5, 160, { align: 'center' });
        doc.save(`DOROS_cert_${topic}.pdf`);
        window.toastMessage(`🎉 Сертификат загружен!`);
    }

    window.markUnderstood = function(lessonIdx) { markLessonCompleted(currentGrade, lessonIdx); toastMessage('Урок отмечен пройденным!'); };
    window.markConfused = function(topic) { addChatMessage(`user`, `Я не понял тему "${topic}", объясни подробнее`); callChatAI(`Объясни тему "${topic}" для ${currentGrade} класса по алгебре простыми словами и примерами`); };

    // Чат-функции + интеграция
    function addChatMessage(role, text) {
        const container = document.getElementById('chatMessagesArea');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${role}`;
        msgDiv.innerHTML = `<div class="msg-bubble">${escapeHtml(text)}</div>`;
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;}); }
    async function callChatAI(prompt) {
        addChatMessage('bot', '🤖 DOROSai печатает...');
        const model = document.getElementById('chatModelSelect').value;
        try {
            const answer = await callAI(prompt, model);
            const lastBot = document.querySelectorAll('.msg.bot');
            if(lastBot.length && lastBot[lastBot.length-1].innerText.includes('печатает')) lastBot[lastBot.length-1].remove();
            addChatMessage('bot', answer);
        } catch(e) { addChatMessage('bot', 'Ошибка ИИ, повтори позже.'); }
    }
    window.aiGenerateTestForCurrentTopic = function() {
        const topics = curriculum[currentGrade];
        const lastLessonIdx = Math.max(0, (progress[currentGrade]||0));
        const topic = topics[lastLessonIdx];
        if(topic) openTestForTopic(topic, currentGrade, lastLessonIdx);
        else toastMessage('Сначала выберите доступный урок');
    };
    window.aiFindVideoByTopic = async function() {
        const topics = curriculum[currentGrade];
        const idx = (progress[currentGrade]||0);
        const topic = topics[idx];
        if(topic) {
            const url = await searchYouTubeVideo(topic, currentGrade);
            addChatMessage('bot', `🔍 Видео по теме "${topic}": ${url.includes('embed') ? 'https://www.youtube.com/watch?v='+url.split('/embed/')[1] : url}`);
        } else toastMessage('Нет активной темы');
    };
    window.aiMakeSummary = async function() {
        const topics = curriculum[currentGrade];
        const idx = (progress[currentGrade]||0);
        const topic = topics[idx];
        if(topic) {
            addChatMessage('user', `Сделай конспект по теме "${topic}" для ${currentGrade} класса алгебра`);
            const summary = await callAI(`Напиши краткий конспект по алгебре: тема "${topic}", ${currentGrade} класс, основные формулы и определения.`, 'openai');
            addChatMessage('bot', summary);
        } else toastMessage('Сначала открой урок');
    };
    document.getElementById('sendChatBtn').onclick = async () => {
        const inp = document.getElementById('chatInput');
        if(!inp.value.trim()) return;
        let text = inp.value;
        addChatMessage('user', text);
        inp.value = '';
        await callChatAI(text);
    };
    // ИИ-решатель задач
    document.getElementById('openSolverBtn').onclick = () => { document.getElementById('solverModal').style.display = 'flex'; document.getElementById('solverAnswer').innerHTML = ''; };
    document.getElementById('solveTaskBtn').onclick = async () => {
        const task = document.getElementById('solverTask').value;
        if(!task.trim()) return;
        document.getElementById('solverAnswer').innerHTML = '<i class="fas fa-spinner fa-pulse"></i> ИИ решает...';
        const solution = await callAI(`Ты репетитор по алгебре. Реши задачу пошагово, подробно. Задача: ${task}`, 'openai');
        document.getElementById('solverAnswer').innerHTML = `<div style="white-space:pre-wrap;">${escapeHtml(solution)}</div>`;
    };
    window.closeModal = (id) => { document.getElementById(id).style.display = 'none'; };
    function toastMessage(msg) { let t=document.createElement('div'); t.className='toast'; t.innerHTML=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }

    // выбор класса
    function buildGradeSelector() {
        const container = document.getElementById('gradeSelector');
        for(let g=5; g<=11; g++) {
            let btn = document.createElement('div');
            btn.className = `grade-btn ${g===currentGrade?'active':''}`;
            btn.innerText = `${g} класс`;
            btn.onclick = () => { currentGrade = g; document.querySelectorAll('.grade-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderLessons(); };
            container.appendChild(btn);
        }
    }

    // инициализация, загрузка чата и хранилища
    loadProgress();
    buildGradeSelector();
    renderLessons();

    document.getElementById('resetProgressBtn').onclick = resetProgress;
    // закрытие модалок по клику на оверлей
    document.querySelectorAll('.modal-overlay').forEach(ov => ov.addEventListener('click', (e) => { if(e.target === ov) ov.style.display = 'none'; }));
    window.toastMessage = toastMessage;
    window.showCertificateForTopic = showCertificateForTopic;
</script>
</body>
</html>
