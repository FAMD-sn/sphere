<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOROSlearn ULTRA · Полная образовательная платформа</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ============================================================
   RESET & ROOT VARIABLES
   ============================================================ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg-deep:#050712;
  --bg-card:rgba(10,14,28,0.85);
  --cyan:#00e5ff;
  --cyan-dim:rgba(0,229,255,0.18);
  --blue:#1a6bff;
  --blue-dim:rgba(26,107,255,0.15);
  --gold:#ffcc00;
  --gold-dim:rgba(255,204,0,0.15);
  --purple:#9d4edd;
  --purple-dim:rgba(157,78,221,0.15);
  --green:#00ff8c;
  --red:#ff3355;
  --border-cyan:rgba(0,229,255,0.22);
  --border-blue:rgba(26,107,255,0.22);
  --text-primary:#f0f4ff;
  --text-muted:rgba(200,210,255,0.55);
  --glass:rgba(0,229,255,0.04);
  --shadow-cyan:0 0 32px rgba(0,229,255,0.18),0 0 8px rgba(0,229,255,0.1);
  --shadow-gold:0 0 28px rgba(255,204,0,0.25);
  --font-head:'Orbitron',monospace;
  --font-body:'Rajdhani',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --r-lg:24px;
  --r-xl:32px;
  --r-full:999px;
  --trans:all 0.28s cubic-bezier(.4,0,.2,1);
}

/* ============================================================
   SCROLLBAR
   ============================================================ */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--cyan);border-radius:2px;opacity:.5;}
::-webkit-scrollbar-thumb:hover{opacity:1;}

/* ============================================================
   BACKGROUND & LAYOUT
   ============================================================ */
body{
  font-family:var(--font-body);
  background:var(--bg-deep);
  color:var(--text-primary);
  overflow-x:hidden;
  min-height:100vh;
  font-size:1rem;
}
.bg-mesh{
  position:fixed;inset:0;z-index:-3;
  background:
    radial-gradient(ellipse 70% 60% at 8% 12%,rgba(26,107,255,0.22),transparent 70%),
    radial-gradient(ellipse 60% 50% at 92% 80%,rgba(0,229,255,0.14),transparent 65%),
    radial-gradient(ellipse 50% 40% at 50% 100%,rgba(157,78,221,0.12),transparent 60%),
    #050712;
}
.bg-grid{
  position:fixed;inset:0;z-index:-2;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);
  background-size:60px 60px;
}
.bg-grid::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 40%,var(--bg-deep) 100%);
}

/* ============================================================
   TOP NAVIGATION
   ============================================================ */
.top-nav{
  position:sticky;top:0;z-index:200;
  background:rgba(5,7,18,0.88);
  backdrop-filter:blur(24px) saturate(1.5);
  border-bottom:1px solid var(--border-cyan);
  padding:0 2rem;
  display:flex;align-items:center;gap:1.5rem;
  height:64px;
}
.brand{
  font-family:var(--font-head);
  font-size:1.1rem;
  font-weight:900;
  letter-spacing:.08em;
  background:linear-gradient(135deg,var(--cyan),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  flex-shrink:0;
}
.subject-tabs{
  display:flex;gap:.5rem;flex-wrap:wrap;flex:1;
  overflow-x:auto;scrollbar-width:none;
}
.subject-tabs::-webkit-scrollbar{display:none;}
.stab{
  font-family:var(--font-body);
  font-weight:600;font-size:.85rem;
  padding:.4rem 1.1rem;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:var(--r-full);
  cursor:pointer;transition:var(--trans);
  color:var(--text-muted);
  background:transparent;
  white-space:nowrap;letter-spacing:.04em;
}
.stab:hover{color:var(--cyan);border-color:var(--border-cyan);}
.stab.active{
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  border-color:transparent;color:#fff;
  box-shadow:var(--shadow-cyan);
  -webkit-text-fill-color:#fff;
}
.nav-right{
  display:flex;align-items:center;gap:.75rem;flex-shrink:0;
}
.avatar-btn{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple),var(--blue));
  border:2px solid var(--border-cyan);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:1.2rem;transition:var(--trans);
}
.avatar-btn:hover{box-shadow:var(--shadow-cyan);transform:scale(1.05);}
.achievements-btn{
  border:1px solid var(--border-cyan);
  border-radius:var(--r-full);
  padding:.35rem .9rem;
  font-size:.78rem;font-weight:600;
  color:var(--gold);cursor:pointer;
  background:var(--gold-dim);
  transition:var(--trans);
}
.achievements-btn:hover{box-shadow:var(--shadow-gold);}

/* ============================================================
   MAIN LAYOUT
   ============================================================ */
.app-layout{
  max-width:1700px;margin:0 auto;
  padding:1.5rem;
  display:flex;gap:1.5rem;
  min-height:calc(100vh - 64px);
}
.learn-panel{
  flex:1.3;
  background:var(--bg-card);
  backdrop-filter:blur(20px);
  border:1px solid var(--border-cyan);
  border-radius:var(--r-xl);
  padding:1.5rem;
  display:flex;flex-direction:column;gap:1.25rem;
  animation:fadeSlideUp .5s ease both;
}
.chat-panel{
  width:390px;flex-shrink:0;
  background:var(--bg-card);
  backdrop-filter:blur(20px);
  border:1px solid var(--border-blue);
  border-radius:var(--r-xl);
  display:flex;flex-direction:column;
  overflow:hidden;
  animation:fadeSlideUp .5s .1s ease both;
}
@keyframes fadeSlideUp{
  from{opacity:0;transform:translateY(24px) scale(.98);}
  to{opacity:1;transform:none;}
}

/* ============================================================
   WELCOME BANNER
   ============================================================ */
.welcome-banner{
  display:flex;align-items:center;gap:1rem;
  padding:1rem 1.25rem;
  background:linear-gradient(135deg,rgba(26,107,255,.15),rgba(0,229,255,.08));
  border:1px solid var(--border-cyan);
  border-radius:var(--r-lg);
}
.welcome-avatar{font-size:2rem;}
.welcome-text h2{font-size:1rem;font-weight:700;margin-bottom:.2rem;}
.welcome-text p{font-size:.8rem;color:var(--text-muted);}
.quote-strip{
  font-size:.78rem;font-style:italic;
  color:var(--text-muted);
  padding:.6rem 1rem;
  background:rgba(255,255,255,.03);
  border-left:3px solid var(--cyan);
  border-radius:0 var(--r-lg) var(--r-lg) 0;
}
.daily-goal-strip{
  display:flex;align-items:center;gap:.75rem;
  padding:.65rem 1rem;
  background:var(--purple-dim);
  border:1px solid rgba(157,78,221,.3);
  border-radius:var(--r-lg);
  font-size:.82rem;font-weight:600;
  cursor:pointer;transition:var(--trans);
}
.daily-goal-strip:hover{background:rgba(157,78,221,.2);}
.daily-goal-strip .goal-icon{font-size:1.2rem;}
.daily-goal-strip .goal-check{
  margin-left:auto;width:22px;height:22px;border-radius:50%;
  border:2px solid var(--purple);
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;
}
.daily-goal-strip.done .goal-check{background:var(--green);border-color:var(--green);color:#000;}

/* ============================================================
   LEVEL / GRADE SELECTOR
   ============================================================ */
.section-label{
  font-family:var(--font-head);
  font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;
  color:var(--text-muted);margin-bottom:.5rem;
}
.grade-scroll{
  display:flex;gap:.5rem;flex-wrap:wrap;
}
.grade-btn{
  font-family:var(--font-body);font-weight:700;
  font-size:.82rem;padding:.42rem 1rem;
  border:1px solid rgba(255,255,255,.1);
  border-radius:var(--r-full);cursor:pointer;
  background:transparent;color:var(--text-muted);
  transition:var(--trans);white-space:nowrap;
}
.grade-btn:hover{color:var(--cyan);border-color:var(--border-cyan);}
.grade-btn.active{
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  border-color:transparent;color:#fff;
  box-shadow:0 0 16px rgba(0,229,255,.25);
}

/* ============================================================
   PROGRESS
   ============================================================ */
.progress-row{
  display:flex;align-items:center;gap:1rem;
}
.progress-wrap{flex:1;position:relative;}
.progress-bg{
  background:rgba(255,255,255,.06);
  border-radius:var(--r-full);height:10px;overflow:hidden;
}
.progress-fill{
  height:100%;border-radius:var(--r-full);
  background:linear-gradient(90deg,var(--blue),var(--cyan));
  width:0%;transition:width .9s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 12px var(--cyan);
}
.progress-label{font-size:.78rem;font-weight:700;color:var(--cyan);}
.svg-donut{
  width:52px;height:52px;flex-shrink:0;
}
.reset-btn{
  font-size:.75rem;padding:.35rem .85rem;
  border:1px solid rgba(255,255,255,.15);
  border-radius:var(--r-full);cursor:pointer;
  background:transparent;color:var(--text-muted);
  transition:var(--trans);
}
.reset-btn:hover{color:var(--red);border-color:var(--red);}

/* ============================================================
   LESSON CARDS
   ============================================================ */
.lessons-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
  gap:1.1rem;
  max-height:55vh;
  overflow-y:auto;
  padding-right:4px;
}
.lesson-card{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(0,229,255,.15);
  border-radius:var(--r-lg);
  padding:1.1rem;
  transition:var(--trans);
  cursor:default;
  animation:cardIn .35s ease both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
.lesson-card:hover{
  transform:translateY(-4px);
  border-color:rgba(0,229,255,.45);
  box-shadow:0 8px 32px rgba(0,229,255,.12);
}
.lesson-card.locked{
  opacity:.35;filter:blur(.5px);pointer-events:none;
}
.lesson-card.done{
  border-color:rgba(0,255,140,.3);
}
.lesson-top{
  display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;
  margin-bottom:.65rem;
}
.lesson-title{font-weight:700;font-size:.95rem;line-height:1.3;}
.lesson-badge{
  flex-shrink:0;font-size:.65rem;font-weight:700;
  padding:.2rem .6rem;border-radius:var(--r-full);
  background:var(--green);color:#000;letter-spacing:.05em;
}
.lesson-badge.locked-badge{background:rgba(255,255,255,.1);color:var(--text-muted);}
.lesson-progress-mini{
  background:rgba(255,255,255,.06);
  border-radius:var(--r-full);height:4px;margin-bottom:.8rem;overflow:hidden;
}
.lesson-progress-fill{
  height:100%;border-radius:var(--r-full);
  background:linear-gradient(90deg,var(--green),var(--cyan));
  transition:width .8s ease;
}
.lesson-actions{
  display:flex;gap:.5rem;flex-wrap:wrap;
}
.btn-sm{
  font-family:var(--font-body);font-weight:600;font-size:.72rem;
  padding:.35rem .85rem;border-radius:var(--r-full);
  border:1px solid rgba(0,229,255,.3);
  background:transparent;color:var(--text-primary);
  cursor:pointer;transition:var(--trans);white-space:nowrap;
}
.btn-sm:hover{background:var(--cyan-dim);border-color:var(--cyan);}
.btn-sm.primary{
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  border:none;color:#fff;
}
.btn-sm.primary:hover{filter:brightness(1.1);transform:translateY(-1px);}
.btn-sm.gold{
  background:var(--gold-dim);
  border-color:rgba(255,204,0,.4);color:var(--gold);
}
.btn-sm.gold:hover{background:rgba(255,204,0,.25);}
.btn-sm.green{
  background:rgba(0,255,140,.08);
  border-color:rgba(0,255,140,.3);color:var(--green);
}

/* ============================================================
   AI CHAT PANEL
   ============================================================ */
.chat-header{
  padding:1rem 1.25rem;
  border-bottom:1px solid var(--border-blue);
  display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;
}
.chat-brand{
  font-family:var(--font-head);font-size:.9rem;font-weight:900;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  flex:1;
}
.model-select{
  background:#080c1a;
  border:1px solid var(--border-cyan);
  border-radius:var(--r-full);
  padding:.3rem .75rem;
  color:var(--cyan);
  font-family:var(--font-body);font-size:.75rem;font-weight:600;
  cursor:pointer;
}
.chat-header-actions{display:flex;gap:.4rem;}
.icon-btn{
  width:32px;height:32px;border-radius:50%;
  border:1px solid rgba(255,255,255,.12);
  background:transparent;color:var(--text-muted);
  cursor:pointer;transition:var(--trans);font-size:.8rem;
  display:flex;align-items:center;justify-content:center;
}
.icon-btn:hover{color:var(--red);border-color:var(--red);}
.quick-btns{
  display:flex;gap:.4rem;padding:.6rem 1rem;
  border-bottom:1px solid rgba(255,255,255,.04);
  flex-wrap:wrap;
}
.qbtn{
  font-size:.68rem;font-weight:600;padding:.28rem .75rem;
  border-radius:var(--r-full);cursor:pointer;transition:var(--trans);
  border:1px solid rgba(0,229,255,.2);
  background:transparent;color:var(--text-muted);
  white-space:nowrap;
}
.qbtn:hover{color:var(--cyan);border-color:var(--cyan);background:var(--cyan-dim);}
.chat-messages{
  flex:1;overflow-y:auto;
  padding:.9rem 1rem;
  display:flex;flex-direction:column;gap:.8rem;
  min-height:0;
}
.msg{display:flex;gap:.5rem;animation:msgIn .25s ease both;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.msg.user{flex-direction:row-reverse;}
.msg-avatar{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;
}
.msg.bot .msg-avatar{background:linear-gradient(135deg,var(--blue),var(--purple));}
.msg.user .msg-avatar{background:linear-gradient(135deg,var(--cyan),var(--blue));}
.msg-bubble{
  max-width:82%;
  background:rgba(255,255,255,.06);
  border-radius:var(--r-lg) var(--r-lg) var(--r-lg) 4px;
  padding:.6rem .9rem;
  font-size:.82rem;line-height:1.55;
  white-space:pre-wrap;word-break:break-word;
}
.msg.user .msg-bubble{
  background:linear-gradient(135deg,var(--blue),rgba(0,229,255,.7));
  border-radius:var(--r-lg) var(--r-lg) 4px var(--r-lg);
  color:#fff;
}
.chat-input-row{
  padding:.85rem;
  border-top:1px solid rgba(255,255,255,.05);
  display:flex;gap:.6rem;align-items:center;
}
.chat-input{
  flex:1;background:rgba(0,0,0,.45);
  border:1px solid var(--border-cyan);
  border-radius:var(--r-full);
  padding:.55rem 1rem;
  color:var(--text-primary);font-family:var(--font-body);font-size:.85rem;
  outline:none;transition:var(--trans);
}
.chat-input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,229,255,.1);}
.send-btn{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  border:none;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.9rem;transition:var(--trans);
}
.send-btn:hover{transform:scale(1.08);box-shadow:var(--shadow-cyan);}

/* ============================================================
   MODALS
   ============================================================ */
.modal-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(3,5,15,.85);
  backdrop-filter:blur(16px);
  display:none;align-items:center;justify-content:center;
  padding:1rem;
}
.modal-overlay.open{display:flex;}
.modal-card{
  background:rgba(8,12,28,.95);
  border:1px solid var(--border-cyan);
  border-radius:var(--r-xl);
  max-width:580px;width:100%;
  max-height:90vh;overflow-y:auto;
  padding:2rem;
  animation:modalIn .3s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes modalIn{
  from{opacity:0;transform:scale(.88) translateY(24px);}
  to{opacity:1;transform:none;}
}
.modal-title{
  font-family:var(--font-head);font-size:1.1rem;
  margin-bottom:1.2rem;display:flex;align-items:center;gap:.75rem;
}
.modal-close{
  margin-left:auto;background:none;border:none;
  color:var(--text-muted);font-size:1.2rem;cursor:pointer;
  transition:var(--trans);
}
.modal-close:hover{color:var(--red);}

/* ============================================================
   TEST UI
   ============================================================ */
.test-timer-bar{
  height:5px;border-radius:var(--r-full);
  background:rgba(255,255,255,.08);margin-bottom:1.2rem;overflow:hidden;
}
.test-timer-fill{
  height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));
  border-radius:var(--r-full);transition:width .1s linear;
}
.test-question-wrap{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);
  border-radius:var(--r-lg);padding:1.1rem;margin-bottom:1rem;
}
.test-q-num{
  font-size:.65rem;font-weight:700;color:var(--cyan);
  letter-spacing:.1em;margin-bottom:.5rem;
}
.test-q-text{font-weight:600;font-size:.92rem;margin-bottom:.85rem;}
.test-options{display:flex;flex-direction:column;gap:.5rem;}
.test-opt{
  display:flex;align-items:center;gap:.65rem;
  padding:.55rem .85rem;border-radius:var(--r-lg);
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.02);
  cursor:pointer;transition:var(--trans);font-size:.85rem;font-weight:500;
}
.test-opt:hover{border-color:var(--cyan);background:var(--cyan-dim);}
.test-opt.selected{border-color:var(--blue);background:var(--blue-dim);}
.test-opt.correct{border-color:var(--green);background:rgba(0,255,140,.12);}
.test-opt.wrong{border-color:var(--red);background:rgba(255,51,85,.12);}
.test-opt input[type=radio]{accent-color:var(--cyan);}
.test-actions{display:flex;gap:.75rem;margin-top:1.2rem;flex-wrap:wrap;}
.btn-lg{
  flex:1;padding:.7rem 1.4rem;border-radius:var(--r-full);
  font-family:var(--font-body);font-weight:700;font-size:.9rem;
  border:none;cursor:pointer;transition:var(--trans);
}
.btn-lg.primary{background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;}
.btn-lg.primary:hover{filter:brightness(1.12);}
.btn-lg.secondary{background:rgba(255,255,255,.06);color:var(--text-muted);}
.test-result-box{
  padding:1rem;border-radius:var(--r-lg);margin-top:1rem;
  font-weight:700;font-size:1rem;text-align:center;
}
.test-result-box.success{background:rgba(0,255,140,.12);border:1px solid rgba(0,255,140,.3);color:var(--green);}
.test-result-box.fail{background:rgba(255,51,85,.1);border:1px solid rgba(255,51,85,.3);color:var(--red);}

/* ============================================================
   NAME MODAL (first launch)
   ============================================================ */
.name-modal-inner{text-align:center;}
.name-modal-inner h2{font-family:var(--font-head);font-size:1.4rem;margin-bottom:.5rem;}
.name-modal-inner p{color:var(--text-muted);font-size:.88rem;margin-bottom:1.5rem;}
.name-input{
  width:100%;background:rgba(0,0,0,.5);
  border:1px solid var(--border-cyan);
  border-radius:var(--r-full);
  padding:.75rem 1.25rem;
  color:var(--text-primary);font-family:var(--font-body);font-size:1rem;
  outline:none;text-align:center;
  transition:var(--trans);margin-bottom:1.2rem;
}
.name-input:focus{border-color:var(--cyan);box-shadow:0 0 0 4px rgba(0,229,255,.1);}
.avatar-picker{display:flex;justify-content:center;gap:.75rem;margin-bottom:1.2rem;}
.avatar-pick-item{
  width:44px;height:44px;border-radius:50%;
  border:2px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;cursor:pointer;transition:var(--trans);
  background:rgba(255,255,255,.04);
}
.avatar-pick-item:hover{transform:scale(1.1);}
.avatar-pick-item.selected{border-color:var(--cyan);box-shadow:0 0 12px var(--cyan);}

/* ============================================================
   ACHIEVEMENTS
   ============================================================ */
.achievements-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:.85rem;
}
.ach-card{
  padding:1rem;border-radius:var(--r-lg);
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
  display:flex;gap:.75rem;align-items:flex-start;
  transition:var(--trans);
}
.ach-card.unlocked{
  border-color:var(--gold-dim);background:var(--gold-dim);
}
.ach-icon{font-size:1.6rem;flex-shrink:0;}
.ach-name{font-weight:700;font-size:.88rem;margin-bottom:.15rem;}
.ach-desc{font-size:.72rem;color:var(--text-muted);}
.ach-card.unlocked .ach-name{color:var(--gold);}

/* ============================================================
   TOAST
   ============================================================ */
.toast{
  position:fixed;bottom:1.5rem;right:1.5rem;
  background:rgba(8,12,28,.95);
  border:1px solid var(--cyan);
  border-radius:var(--r-full);
  padding:.65rem 1.25rem;
  font-size:.82rem;font-weight:600;
  z-index:2000;
  animation:toastIn .3s ease both;
  pointer-events:none;
}
@keyframes toastIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}

/* ============================================================
   CONFETTI CANVAS
   ============================================================ */
#confettiCanvas{
  position:fixed;inset:0;z-index:1900;
  pointer-events:none;display:none;
}

/* ============================================================
   FORMULA NUDGE
   ============================================================ */
.formula-nudge{
  position:fixed;bottom:1.5rem;left:1.5rem;
  max-width:290px;
  background:rgba(8,12,28,.96);
  border:1px solid var(--purple);
  border-radius:var(--r-lg);
  padding:1rem 1.2rem;
  z-index:900;
  display:none;
  animation:nudgeIn .35s ease both;
}
@keyframes nudgeIn{from{opacity:0;transform:translateX(-20px);}to{opacity:1;transform:none;}}
.formula-nudge h4{font-size:.82rem;font-weight:700;color:var(--purple);margin-bottom:.4rem;}
.formula-nudge .formula-text{
  font-family:var(--font-mono);font-size:1rem;
  color:var(--cyan);background:rgba(0,229,255,.06);
  padding:.4rem .75rem;border-radius:var(--r-lg);margin-bottom:.7rem;
}
.nudge-actions{display:flex;gap:.5rem;}
.nudge-btn{
  flex:1;padding:.35rem;border-radius:var(--r-full);
  font-size:.75rem;font-weight:700;border:none;cursor:pointer;transition:var(--trans);
}
.nudge-btn.know{background:var(--green);color:#000;}
.nudge-btn.dk{background:rgba(255,255,255,.08);color:var(--text-muted);}

/* ============================================================
   TIMER TOGGLE
   ============================================================ */
.timer-toggle{
  display:flex;align-items:center;gap:.5rem;
  font-size:.78rem;color:var(--text-muted);
  cursor:pointer;user-select:none;
}
.timer-toggle input{accent-color:var(--cyan);}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media(max-width:1050px){
  .app-layout{flex-direction:column;}
  .chat-panel{width:100%;max-height:520px;}
}
@media(max-width:640px){
  .top-nav{padding:0 1rem;gap:.75rem;}
  .brand{font-size:.85rem;}
  .app-layout{padding:.75rem;}
  .lessons-grid{max-height:none;}
}

function getSubjectProgress(subj){
  let total=0, done=0;
  Object.entries(SUBJECTS[subj].levels).forEach(([lev,topics])=>{
    total+=topics.length;
    done+=(getProgress(subj,lev)).length;
  });
  return total>0?Math.round(done/total*100):0;
}
function getLevelProgress(subj,lev){
  const topics=SUBJECTS[subj].levels[lev]||[];
  const done=getProgress(subj,lev).length;
  return topics.length>0?Math.round(done/topics.length*100):0;
}
function updateProgress(){
  const pct = getLevelProgress(state.subject, state.level);
  const fill = document.getElementById('globalProgressFill');
  const label = document.getElementById('progressLabel');
  const donut = document.getElementById('donutFill');
  if(fill) setTimeout(()=>fill.style.width=pct+'%', 80);
  if(label) label.textContent=pct+'%';
  if(donut){
    const circ=138;
    const offset=circ-(pct/100)*circ;
    setTimeout(()=>donut.style.strokeDashoffset=offset, 80);
  }
}

function openTest(subj, lev, topicIdx){
  const questions = (TESTS[subj]||{})[lev]||[];
  if(!questions[topicIdx]){
    toastMsg('Тест для этой темы скоро будет добавлен','ℹ️'); return;
  }
  currentTestData = { subj, lev, topicIdx, questions: questions[topicIdx] };
  const topic = SUBJECTS[subj].levels[lev][topicIdx];
  document.getElementById('testModalTitle').innerHTML=
    `<i class="fas fa-pencil-alt" style="color:var(--cyan)"></i> Тест: ${topic}
    <button class="modal-close" onclick="closeModal('testModal')">✕</button>`;
  renderTestBody();
  openModal('testModal');
  document.getElementById('testResult').innerHTML='';
  if(state.timerEnabled) startTestTimer();
}
function renderTestBody(){
  if(!currentTestData) return;
  const {questions} = currentTestData;
  let html='';
  questions.forEach((q,qi)=>{
    html+=`<div class="test-question-wrap">
      <div class="test-q-num">ВОПРОС ${qi+1} / ${questions.length}</div>
      <div class="test-q-text">${q.t}</div>
      <div class="test-options">`;
    q.o.forEach((opt,oi)=>{
      html+=`<label class="test-opt" id="opt_${qi}_${oi}">
        <input type="radio" name="q${qi}" value="${oi}" onchange="selectOpt(${qi},${oi})">
        ${opt}
      </label>`;
    });
    html+=`</div></div>`;
  });
  document.getElementById('testBody').innerHTML=html;
}
function selectOpt(qi, oi){
  document.querySelectorAll(`label[id^="opt_${qi}_"]`).forEach(l=>{
    l.classList.remove('selected');
  });
  document.getElementById(`opt_${qi}_${oi}`).classList.add('selected');
}
function checkTest(){
  if(!currentTestData) return;
  const {subj,lev,topicIdx,questions}=currentTestData;
  let correct=0;
  questions.forEach((q,qi)=>{
    const sel=document.querySelector(`input[name="q${qi}"]:checked`);
    const ans = sel?parseInt(sel.value):-1;
    // highlight
    q.o.forEach((_,oi)=>{
      const lbl=document.getElementById(`opt_${qi}_${oi}`);
      if(oi===q.c) lbl.classList.add('correct');
      else if(oi===ans && ans!==q.c) lbl.classList.add('wrong');
    });
    if(ans===q.c) correct++;
  });
  stopTestTimer();
  const passed = correct>=4;
  const resEl = document.getElementById('testResult');
  resEl.innerHTML=`<div class="test-result-box ${passed?'success':'fail'}">
    ${passed?'🎉':'❌'} Правильных ответов: ${correct}/${questions.length}
    ${passed?' — Тема освоена! Отличная работа!':`— Попробуй ещё раз. Рекомендуем повторить тему.`}
  </div>`;
  document.getElementById('checkTestBtn').disabled=true;
  if(passed){
    markTopicDone(subj,lev,topicIdx);
    state.totalTestsDone++;
    checkDailyGoalDone();
    saveState();
    renderLessons(); updateProgress();
    setTimeout(()=>launchConfetti(),300);
  }
  checkAchievements();
}
function startTestTimer(){
  if(!currentTestData) return;
  const total = currentTestData.questions.length*30;
  testTimeLeft=total;
  const fill=document.getElementById('testTimerFill');
  clearInterval(testTimerInterval);
  testTimerInterval=setInterval(()=>{
    testTimeLeft--;
    if(fill) fill.style.width=(testTimeLeft/total*100)+'%';
    if(testTimeLeft<=0){ clearInterval(testTimerInterval); checkTest(); }
  },1000);
}
function stopTestTimer(){ clearInterval(testTimerInterval); }
document.getElementById('timerToggle').onchange=function(){
  state.timerEnabled=this.checked; saveState();
};

function downloadCert(subj, lev, topicIdx, topic){
  if(!isTopicDone(subj,lev,topicIdx)){
    toastMsg('Пройди тест, чтобы получить сертификат','⚠️'); return;
  }
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  // Background gradient via rectangles
  for(let i=0;i<297;i+=3){
    const r1=[5,7,18], r2=[30,0,60];
    const t=i/297;
    const r=Math.round(r1[0]+(r2[0]-r1[0])*t);
    const g=Math.round(r1[1]+(r2[1]-r1[1])*t);
    const b=Math.round(r1[2]+(r2[2]-r1[2])*t);
    doc.setFillColor(r,g,b);

  [[14,14],[283,14],[14,196],[283,196]].forEach(([x,y])=>{

  });
  // Header

  doc.setFont('helvetica','bold');
  doc.setFontSize(36); doc.text('СЕРТИФИКАТ',148.5,55,{align:'center'});

  const nameW=doc.getTextWidth(state.userName||'Ученик');

  doc.line(148.5-nameW/2,87,148.5+nameW/2,87);
  // Body text
  doc.setFontSize(12); doc.setTextColor(180,190,220);
  doc.text('успешно освоил(а) тему:',148.5,98,{align:'center'});
  doc.setFontSize(16); doc.setTextColor(0,229,255);
  doc.text(topic,148.5,108,{align:'center',maxWidth:250});
  doc.setFontSize(11); doc.setTextColor(160,175,210);
  doc.text(`Предмет: ${subj}     Уровень: ${lev}`,148.5,122,{align:'center'});
  // Cert number
  const certNum = genCertNum();
  doc.setFontSize(9); doc.setTextColor(100,120,160);
  doc.text(`Сертификат №: ${certNum}`,148.5,132,{align:'center'});

  const dateStr = new Date().toLocaleDateString('ru-RU',{year:'numeric',month:'long',day:'numeric'});

  // Seal circle
  doc.setDrawColor(255,204,0); doc.setLineWidth(1.5);
  doc.circle(148.5,165,18,'S');
  doc.circle(148.5,165,14,'S');
  doc.setFontSize(8); doc.setTextColor(255,204,0);
  // Text around seal
  const sealText='DOROSphere · DOROS·learn · ULTRA ·';
  doc.text(sealText,148.5,165,{align:'center',angle:0});
  doc.setFontSize(18); doc.text('✦',148.5,168,{align:'center'});
  doc.setFontSize(7); doc.setTextColor(150,160,200);
  doc.text('Образовательная платформа DOROSlearn ULTRA',148.5,195,{align:'center'});
  doc.save(`DOROS_cert_${topic.replace(/\s+/g,'_')}.pdf`);
  launchStars();
  toastMsg('Сертификат скачан!','🎓');
}
function genCertNum(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let r='';
  for(let i=0;i<12;i++) r+=chars[Math.floor(Math.random()*chars.length)];
  return r.match(/.{4}/g).join('-');
}

// ================================================================
// CONFETTI
// ================================================================
function launchConfetti(){
  const canvas=document.getElementById('confettiCanvas');
  canvas.style.display='block';
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const particles=[];
  for(let i=0;i<160;i++){
    particles.push({
      x:Math.random()*canvas.width, y:-10,
      vx:(Math.random()-0.5)*6, vy:Math.random()*4+2,
      r:Math.random()*6+3,
      color:`hsl(${Math.random()*360},80%,60%)`,
      rot:Math.random()*Math.PI*2, vr:(Math.random()-0.5)*0.2
    });
  }
  let frame=0;
  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.color;
      ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);
      ctx.restore();
    });
    frame++;
    if(frame<120) requestAnimationFrame(tick);
    else{ ctx.clearRect(0,0,canvas.width,canvas.height); canvas.style.display='none'; }
  }
  tick();
}
function launchStars(){
  const canvas=document.getElementById('confettiCanvas');
  canvas.style.display='block';
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const ctx=canvas.getContext('2d');
  const stars=[];
  for(let i=0;i<80;i++){
    stars.push({
      x:Math.random()*canvas.width, y:Math.random()*canvas.height/2-20,
      vy:Math.random()*3+1, size:Math.random()*16+8,
      alpha:1, color:'#ffcc00'
    });
  }
  let fr=0;
  function tick2(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{
      s.y+=s.vy; s.alpha=Math.max(0,1-fr/90);
      ctx.globalAlpha=s.alpha;
      ctx.fillStyle=s.color;
      ctx.font=s.size+'px serif';
      ctx.fillText('★',s.x,s.y);
    });
    ctx.globalAlpha=1; fr++;
    if(fr<100) requestAnimationFrame(tick2);
    else{ ctx.clearRect(0,0,canvas.width,canvas.height); canvas.style.display='none'; }
  }
  tick2();
}

function addMsg(role, text){
  const container=document.getElementById('chatMessages');
  const d=document.createElement('div');
  d.className=`msg ${role}`;
  const avatar=document.createElement('div');
  avatar.className='msg-avatar';
  avatar.textContent=role==='user'?(AVATARS[state.avatarIdx]||'👤'):'🤖';
  const bubble=document.createElement('div');
  bubble.className='msg-bubble';
  bubble.textContent=text;
  if(role==='user'){ d.appendChild(bubble); d.appendChild(avatar); }
  else { d.appendChild(avatar); d.appendChild(bubble); }
  container.appendChild(d);
  container.scrollTop=container.scrollHeight;
  // Save to history
  state.chatHistory.push({role,text});
  if(state.chatHistory.length>40) state.chatHistory=state.chatHistory.slice(-40);
  saveState();
  return bubble;
}

  if(!resp.ok) throw new Error('AI error');
  return await resp.text();

  if(!state.dailyGoalDone){
    state.dailyGoalDone=true; saveState(); renderDailyGoal();
    toastMsg('🎯 Ежедневная цель выполнена! Отличная работа!','🎉');
  }
}
function checkDailyGoal(){
  if(state.dailyGoalDone) toastMsg('Ты уже выполнил цель на сегодня!','✅');
  else toastMsg('Пройди 1 тест, чтобы выполнить цель!','🎯');
}

// ================================================================
// ACHIEVEMENTS
// ================================================================
const ACH_DEFS = [
  {id:'first', icon:'🌟', name:'Новичок', desc:'Пройти 1 тест', check:()=>state.totalTestsDone>=1},
  {id:'five', icon:'📚', name:'Ученик', desc:'Пройти 5 тестов', check:()=>state.totalTestsDone>=5},
  {id:'ten', icon:'🧠', name:'Эрудит', desc:'Пройти 10 тестов', check:()=>state.totalTestsDone>=10},
  {id:'twenty', icon:'🎓', name:'Профессор', desc:'Пройти 20 тестов', check:()=>state.totalTestsDone>=20},
  {id:'polyglot', icon:'🌐', name:'Полиглот', desc:'Тесты в 3 предметах', check:()=>{
    const subjs=Object.keys(state.progress).filter(s=>Object.values(state.progress[s]||{}).some(arr=>arr.length>0));
    return subjs.length>=3;
  }},
  {id:'streak', icon:'🔥', name:'Горящий', desc:'Выполни ежедневную цель', check:()=>state.dailyGoalDone},
];
function checkAchievements(){
  ACH_DEFS.forEach(a=>{
    if(!state.achievements[a.id] && a.check()){
      state.achievements[a.id]=true; saveState();
      toastMsg(`🏆 Достижение разблокировано: ${a.name}!`,'⭐');
    }
  });
  refreshAchievements();
}
function refreshAchievements(){
  const grid=document.getElementById('achGrid');
  if(!grid) return;
  grid.innerHTML='';
  ACH_DEFS.forEach(a=>{
    const unlocked=!!state.achievements[a.id];
    const card=document.createElement('div');
    card.className='ach-card'+(unlocked?' unlocked':'');
    card.innerHTML=`<div class="ach-icon">${a.icon}</div>
      <div><div class="ach-name">${a.name}</div><div class="ach-desc">${a.desc}</div>
      ${unlocked?'<div style="font-size:.65rem;color:var(--green);margin-top:.2rem;">✓ Получено</div>':''}</div>`;
    grid.appendChild(card);
  });
}

// ================================================================
// PROFILE MODAL
// ================================================================
function buildProfileContent(){
  const el=document.getElementById('profileContent');
  if(!el) return;
  const totalPct=Math.round(
    Object.keys(SUBJECTS).reduce((sum,s)=>sum+getSubjectProgress(s),0)/Object.keys(SUBJECTS).length
  );
  el.innerHTML=`
    <div style="font-size:3rem;margin:.5rem 0">${AVATARS[state.avatarIdx]||'🎓'}</div>
    <div style="font-size:1.2rem;font-weight:700;margin-bottom:.25rem">${state.userName}</div>
    <div style="color:var(--text-muted);font-size:.82rem;margin-bottom:1.2rem">
      Пройдено тестов: <strong style="color:var(--cyan)">${state.totalTestsDone}</strong>
      &nbsp;&nbsp;Общий прогресс: <strong style="color:var(--gold)">${totalPct}%</strong>
    </div>
    <div style="text-align:left;margin-bottom:1.2rem">
      <div class="section-label">Выбрать аватар</div>
      <div class="avatar-picker" id="profileAvatarPicker"></div>
    </div>
    <button class="btn-lg primary" onclick="changeAvatar()" style="width:100%;margin-bottom:.5rem">Сохранить</button>
    <button class="btn-lg secondary" onclick="openModal('achievementsModal')" style="width:100%">🏆 Достижения</button>
  `;
  const picker=document.getElementById('profileAvatarPicker');
  AVATARS.forEach((a,i)=>{
    const d=document.createElement('div');
    d.className='avatar-pick-item'+(i===state.avatarIdx?' selected':'');
    d.textContent=a; d.dataset.idx=i;
    d.onclick=()=>{
      state.avatarIdx=i;
      document.querySelectorAll('#profileAvatarPicker .avatar-pick-item').forEach(x=>x.classList.remove('selected'));
      d.classList.add('selected');
    };
    picker.appendChild(d);
  });
}
function changeAvatar(){
  saveState(); updateNavAvatar(); updateWelcome();
  closeModal('profileModal');
  toastMsg('Аватар обновлён!','✨');
}

// ================================================================
// FORMULA NUDGE
// ================================================================
function scheduleFormulaNudge(){
  setTimeout(showNudge, 5*60*1000); // 5 min
}
function showNudge(){
  const f=FORMULAS[Math.floor(Math.random()*FORMULAS.length)];
  document.getElementById('nudgeFormula').textContent=f.t||f.f;
  document.getElementById('nudgeExplain').textContent=f.e;
  document.getElementById('nudgeExplain').style.display='none';
  document.getElementById('formulaNudge').style.display='block';
}
function nudgeKnow(){
  document.getElementById('formulaNudge').style.display='none';
  toastMsg('Отлично! Формула в памяти 🧠','✅');
  setTimeout(showNudge,5*60*1000);
}
function nudgeDK(){
  document.getElementById('nudgeExplain').style.display='block';
  toastMsg('Прочитай объяснение, это поможет!','💡');
  setTimeout(()=>{ document.getElementById('formulaNudge').style.display='none'; setTimeout(showNudge,5*60*1000); }, 8000);
}

// ================================================================
// MODALS
// ================================================================
function openModal(id){
  if(id==='profileModal') buildProfileContent();
  document.getElementById(id).classList.add('open');
}
function closeModal(id){
  const el=document.getElementById(id);
  if(el) el.classList.remove('open');
  if(id==='testModal'){
    stopTestTimer();
    document.getElementById('checkTestBtn').disabled=false;
    currentTestData=null;
  }
}

// ================================================================
// TOAST
// ================================================================
function toastMsg(msg, icon='ℹ️'){
  const t=document.createElement('div');
  t.className='toast';
  t.innerHTML=`${icon} ${msg}`;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateY(12px)'; setTimeout(()=>t.remove(),300); }, 2800);
}

// ================================================================
// KEYBOARD SHORTCUT: Enter for chat
// ================================================================
window.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.querySelectorAll('.modal-overlay.open').forEach(m=>{ if(m.id!=='nameModal'||state.userName) closeModal(m.id); });
  }
});

// ================================================================
// EXPOSE GLOBALS
// ================================================================
window.openTest=openTest;
window.downloadCert=downloadCert;
window.askChatAbout=askChatAbout;
window.markDoneManual=markDoneManual;
window.saveName=saveName;
window.sendChat=sendChat;
window.clearChatHistory=clearChatHistory;
window.checkTest=checkTest;
window.closeModal=closeModal;
window.openModal=openModal;
window.checkDailyGoal=checkDailyGoal;
window.selectOpt=selectOpt;
window.changeAvatar=changeAvatar;
window.nudgeKnow=nudgeKnow;
window.nudgeDK=nudgeDK;
window.aiTestCurrentTopic=aiTestCurrentTopic;
window.aiSummary=aiSummary;
window.aiExplain=aiExplain;
window.aiVideo=aiVideo;
window.resetProgress=resetProgress;
</script>
</body>
